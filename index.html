<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Android Emulator</title>
    <script src="./libv86.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #screen_container { width: 800px; height: 600px; background: #000; border: 2px solid #333; }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; flex-direction:column; align-items:center; justify-content:center; }
        .controls { margin-top: 20px; background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        #status { color: #4caf50; font-family: monospace; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="loader"><p>STARTING EMULATOR...</p></div>
    <div id="screen_container"><canvas></canvas></div>
    <div class="controls">
        <input type="file" id="iso_input" accept=".iso">
        <div id="status">STATUS: READY</div>
    </div>
    <script src="./launcher.js"></script>
</body>
</html>
