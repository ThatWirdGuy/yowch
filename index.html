<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android x86 Browser Emulator</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #screen_container { width: 800px; height: 600px; background: #000; border: 4px solid #333; border-radius: 8px; position: relative; cursor: crosshair; }
        #screen_container canvas { display: block; width: 100%; height: 100%; }
        .controls { margin-top: 20px; padding: 15px; background: #2a2a2a; border-radius: 10px; text-align: center; width: 400px; }
        #status { color: #00ff00; margin-top: 10px; font-family: monospace; font-size: 14px; }
        
        /* Loading Overlay */
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; flex-direction:column; align-items:center; justify-content:center; }
        .spinner { border: 6px solid #333; border-top: 6px solid #3498db; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader_text { margin-top: 20px; font-size: 18px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader_text">INITIALIZING SYSTEM...</div>
    </div>

    <h2>Android x86 Virtual Machine</h2>

    <div id="screen_container">
        <div style="white-space: pre; font-family: Courier, monospace; display: none;"></div>
        <canvas></canvas>
    </div>

    <div class="controls">
        <input type="file" id="iso_input" accept=".iso">
        <div id="status">Ready. Select Android ISO from SourceForge.</div>
    </div>

    <script src="https://copy.sh/v86/build/libv86.js"></script>
    <script src="content_reporter.js"></script>
    <script src="launcher.js"></script>

</body>
</html>
