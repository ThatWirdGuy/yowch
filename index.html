<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Android x86 | Vercel Deployment</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #screen_container { width: 800px; height: 600px; background: #000; border: 2px solid #3498db; box-shadow: 0 0 20px rgba(52, 152, 219, 0.2); }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; flex-direction:column; align-items:center; justify-content:center; }
        .spinner { border: 4px solid #333; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .upload-area { margin-top: 20px; padding: 20px; border: 1px dashed #444; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div><p id="loader_text">INITIALIZING...</p></div>
    
    <div id="screen_container"><canvas></canvas></div>

    <div class="upload-area">
        <input type="file" id="iso_input" accept=".iso">
        <p id="status">Vercel Status: Ready. Please select your Android ISO.</p>
    </div>

    <script src="libv86.js"></script>
    <script src="content_reporter.js"></script>
    <script src="launcher.js"></script>
</body>
</html>
