<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vercel Android x86</title>
    <script src="./libv86.js"></script>
    <style>
        body { background: #0f0f0f; color: #00ff00; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #screen_container { width: 800px; height: 600px; background: #000; border: 2px solid #333; position: relative; }
        #screen_container canvas { display: block; width: 100%; height: 100%; }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; flex-direction:column; align-items:center; justify-content:center; }
        .spinner { border: 4px solid #222; border-top: 4px solid #00ff00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .controls { margin-top: 20px; border: 1px solid #333; padding: 20px; border-radius: 5px; background: #1a1a1a; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div><p id="loader_text">LOADING VM...</p></div>
    
    <div id="screen_container"><canvas></canvas></div>

    <div class="controls">
        <input type="file" id="iso_input" accept=".iso">
        <p id="status">READY: SELECT ANDROID ISO</p>
    </div>

    <script src="./launcher.js"></script>
</body>
</html>
