<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Android x86 Local Emulator</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #screen_container { width: 800px; height: 600px; background: #000; border: 4px solid #333; }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; flex-direction:column; align-items:center; justify-content:center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div><p id="loader_text">Loading...</p></div>
    <h2>Android x86 Local VM</h2>
    <div id="screen_container"><canvas></canvas></div>
    <div style="margin-top:20px;">
        <input type="file" id="iso_input">
        <p id="status">Ready. Select Android ISO.</p>
    </div>

    <script src="libv86.js"></script>
    <script src="content_reporter.js"></script>
    <script src="launcher.js"></script>
</body>
</html>
