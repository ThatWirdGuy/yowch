<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Android VM | Fixed</title>
    <script src="coi-serviceworker.js"></script>
    <script>
        // Force a page reload if the security unlocker hasn't kicked in yet
        if (!window.crossOriginIsolated && window.location.hostname !== "localhost") {
            console.log("Security handshake in progress...");
        }
    </script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 50px; }
        #screen_container { width: 800px; height: 600px; margin: auto; border: 2px solid #333; }
        #status { background: #111; padding: 10px; display: inline-block; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="screen_container"><canvas></canvas></div>
    <div style="margin-top:20px;">
        <input type="file" id="iso_input" accept=".iso">
        <p id="status">STATUS: INITIALIZING ENGINE...</p>
    </div>
    <script src="./libv86.js"></script>
    <script src="./launcher.js"></script>
</body>
</html>
